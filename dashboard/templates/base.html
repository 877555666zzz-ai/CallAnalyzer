<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Call Analyzer{% endblock %}</title>
  <style>
    :root { --bg:#0f1419; --card:#1a212b; --line:#2a3543; --txt:#e6edf3; --mut:#8b97a7;
            --accent:#3b82f6; --good:#22c55e; --bad:#ef4444; --warn:#f59e0b; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--txt);
           font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
    a { color:var(--accent); text-decoration:none; }
    nav { display:flex; gap:20px; padding:14px 24px; border-bottom:1px solid var(--line);
          background:var(--card); position:sticky; top:0; }
    nav .brand { font-weight:700; }
    .wrap { max-width:1100px; margin:0 auto; padding:24px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:16px; }
    .grid { display:grid; gap:14px; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); }
    .kpi .v { font-size:26px; font-weight:700; }
    .kpi .l { color:var(--mut); font-size:13px; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); }
    th { color:var(--mut); font-weight:600; font-size:13px; }
    .pill { display:inline-block; padding:2px 9px; border-radius:999px; font-size:12px; }
    .pill.good { background:rgba(34,197,94,.15); color:var(--good); }
    .pill.bad { background:rgba(239,68,68,.15); color:var(--bad); }
    .pill.warn { background:rgba(245,158,11,.15); color:var(--warn); }
    .mut { color:var(--mut); }
    input { background:var(--bg); border:1px solid var(--line); color:var(--txt);
            border-radius:8px; padding:8px 10px; }
    .seg { padding:8px 12px; border-radius:8px; margin:6px 0; }
    .seg.operator { background:rgba(59,130,246,.08); }
    .seg.client { background:rgba(255,255,255,.03); }
    .seg.flagged { outline:2px solid var(--bad); }
    .seg .who { font-size:12px; color:var(--mut); }
    .check { display:flex; gap:8px; padding:5px 0; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">📞 Call Analyzer</span>
    <a href="/">Где деньги</a>
    <a href="/conversions">Конверсии</a>
    <a href="/tops">Топы</a>
    <a href="/calls">Звонки</a>
    <span style="flex:1"></span>
    <a href="/boss">👔 Руководитель</a>
    <a href="/rop">🎧 РОП</a>
  </nav>
  <div class="wrap">{% block body %}{% endblock %}</div>
</body>
</html>
